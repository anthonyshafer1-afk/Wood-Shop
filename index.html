<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WoodShop">
<meta name="theme-color" content="#1a1208">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WoodShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208; --bark: #3d2b1a; --grain: #7a5c3a;
    --sawdust: #c9a87c; --shaving: #f0e4d0; --paper: #faf6f0;
    --accent: #d4651a; --gift: #7b4fa6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; overscroll-behavior: none; }
  .header { position: sticky; top: 0; z-index: 100; background: var(--ink); padding: 12px 16px; padding-top: calc(12px + var(--safe-top)); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--shaving); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .add-btn { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 50%; color: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .search-bar { display: flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 8px 12px; gap: 8px; }
  .search-bar input { background: none; border: none; outline: none; color: var(--shaving); font-family: 'DM Sans', sans-serif; font-size: 15px; width: 100%; }
  .search-bar input::placeholder { color: rgba(240,228,208,0.4); }
  .search-icon { color: rgba(240,228,208,0.4); font-size: 16px; }
  .filters { display: flex; gap: 8px; padding: 11px 14px; overflow-x: auto; scrollbar-width: none; background: var(--paper); border-bottom: 1px solid rgba(0,0,0,0.06); }
  .filters::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--sawdust); background: transparent; color: var(--grain); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .chip.active { background: var(--bark); border-color: var(--bark); color: var(--shaving); }
  .chip.gift-chip { border-color: var(--gift); color: var(--gift); }
  .chip.gift-chip.active { background: var(--gift); border-color: var(--gift); color: white; }
  .grid { columns: 2; column-gap: 10px; padding: 12px 10px; padding-bottom: calc(24px + var(--safe-bot)); }
  @media (min-width: 500px) { .grid { columns: 3; } }
  .card { break-inside: avoid; margin-bottom: 10px; border-radius: 14px; overflow: hidden; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.15s; }
  .card:active { transform: scale(0.97); }
  .card-img { width: 100%; position: relative; overflow: hidden; background: var(--shaving); }
  .card-img img { width: 100%; display: block; object-fit: cover; }
  .card-placeholder { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; padding: 22px 10px; min-height: 110px; background: linear-gradient(135deg, var(--shaving), #e8d5b8); }
  .card-placeholder.gift-bg { background: linear-gradient(135deg, #f3eafa, #e4d0f5); }
  .card-placeholder .emoji { font-size: 30px; }
  .card-placeholder .plabel { font-size: 10px; color: var(--grain); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; text-align: center; }
  .card-placeholder.gift-bg .plabel { color: var(--gift); }
  .card-badge { position: absolute; top: 8px; right: 8px; background: rgba(26,18,8,0.75); color: var(--shaving); font-size: 10px; padding: 3px 7px; border-radius: 10px; font-weight: 500; }
  .card-badge.done { background: rgba(40,120,60,0.85); }
  .card-badge.gift { background: rgba(123,79,166,0.85); }
  .card-body { padding: 9px 10px 11px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--ink); line-height: 1.3; margin-bottom: 3px; }
  .card-type { font-size: 11px; color: var(--grain); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
  .card-type.gift-type { color: var(--gift); }.overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(3px); }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet { background: var(--paper); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); padding-bottom: calc(24px + var(--safe-bot)); }
  .overlay.open .sheet { transform: translateY(0); }
  .handle { width: 40px; height: 4px; background: var(--sawdust); border-radius: 2px; margin: 12px auto 0; }
  .modal-hero { width: 100%; background: var(--shaving); margin-top: 12px; min-height: 180px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
  .modal-hero.gift-hero { background: linear-gradient(135deg, #f3eafa, #e4d0f5); }
  .modal-hero img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .modal-hero .big-emoji { font-size: 52px; }
  .modal-hero .hero-label { font-size: 12px; color: var(--grain); font-weight: 500; }
  .modal-hero .hero-label.gift-label { color: var(--gift); }
  .mc { padding: 18px 18px 0; }
  .modal-tag { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); margin-bottom: 5px; }
  .modal-tag.gift-tag { color: var(--gift); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--ink); line-height: 1.2; margin-bottom: 12px; }
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill { padding: 5px 12px; border-radius: 20px; background: var(--shaving); font-size: 12px; color: var(--bark); font-weight: 500; }
  .pill.gift-pill { background: #f3eafa; color: var(--gift); }
  .pill.done-pill { background: #d4f0dc; color: #1a5c2a; }
  .msec { margin-bottom: 16px; }
  .msec h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--grain); font-weight: 600; margin-bottom: 7px; }
  .msec p { font-size: 15px; color: var(--bark); line-height: 1.6; }
  .tools-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-tag { padding: 4px 10px; background: white; border: 1px solid var(--sawdust); border-radius: 6px; font-size: 12px; color: var(--grain); }
  .link-btn { display: flex; align-items: center; gap: 8px; padding: 11px 14px; background: white; border: 1.5px solid var(--sawdust); border-radius: 10px; text-decoration: none; color: var(--bark); font-size: 14px; font-weight: 500; width: 100%; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--shaving); }
  .btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-muted { background: var(--shaving); color: var(--bark); }
  .btn-green { background: #2d7a45; color: white; }
  .add-overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.6); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .add-overlay.open { opacity: 1; pointer-events: all; }
  .add-sheet { background: var(--paper); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); padding: 0 18px calc(24px + var(--safe-bot)); }
  .add-overlay.open .add-sheet { transform: translateY(0); }
  .add-sheet h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); padding: 18px 0 14px; border-bottom: 1px solid var(--shaving); margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--grain); margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; padding: 11px 13px; border: 1.5px solid var(--sawdust); border-radius: 10px; background: white; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--grain); column-span: all; }
  .empty .big { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.5; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">Wood<span>Shop</span></div>
    <button class="add-btn" onclick="openAdd()">+</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="search" placeholder="Search projects…" id="searchInput" oninput="renderGrid()">
  </div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="detailOverlay" onclick="closeDetailClick(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div id="modalHero" class="modal-hero"></div>
    <div class="mc" id="modalContent"></div>
  </div>
</div>
<div class="add-overlay" id="addOverlay">
  <div class="add-sheet">
    <h2>New Project</h2>
    <div class="field"><label>Project Name</label><input type="text" id="newTitle" placeholder="e.g. Dovetail Box"></div>
    <div class="field"><label>Category</label>
      <select id="newType">
        <option value="Jig">Jig</option>
        <option value="Accessory">Accessory / Shop Tool</option>
        <option value="Box">Box / Container</option>
        <option value="Furniture">Furniture</option>
        <option value="Joinery Practice">Joinery Practice</option>
        <option value="Gift">Gift</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field"><label>Difficulty</label>
      <select id="newDiff">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>
    <div class="field"><label>Notes / Description</label><textarea id="newNotes" placeholder="Dimensions, technique notes, inspiration…"></textarea></div>
    <div class="field"><label>Tools Needed (comma separated)</label><input type="text" id="newTools" placeholder="e.g. Chisel, Plane, Saw"></div>
    <div class="field"><label>Reference Link (URL)</label><input type="url" id="newLink" placeholder="https://…"></div>
    <div class="field"><label>Image URL (optional)</label><input type="url" id="newImg" placeholder="https://…"></div>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <button class="btn btn-muted" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-accent" onclick="saveProject()">Add Project</button>
    </div>
  </div>
</div><script>
const STORAGE_KEY = 'woodshop_v2';
const CATS = ['All','Jig','Accessory','Box','Furniture','Joinery Practice','Gift','Other'];
const DEFAULTS = [
  { id:1, title:"Chopstick Making Jig", type:"Jig", difficulty:"Beginner", notes:"A simple jig to plane square stock into tapered chopsticks. Requires a hand plane and a wedge to hold the blank at the correct angle.", tools:["Hand Plane","Chisel","Saw"], link:"", img:"", done:false, emoji:"🥢" },
  { id:2, title:"Shooting Board", type:"Accessory", difficulty:"Beginner", notes:"Flat board with a fence to hold workpieces at 90° for planing end grain square. Essential shop accessory.", tools:["Hand Plane","Chisel","Square"], link:"https://paulsellers.com", img:"", done:false, emoji:"📐" },
  { id:3, title:"Bench Hook", type:"Accessory", difficulty:"Beginner", notes:"Hooks over the bench edge to hold work while sawing. Can be made from scrap in under an hour.", tools:["Saw","Chisel","Square"], link:"", img:"", done:false, emoji:"🪝" },
  { id:4, title:"Tongue & Groove Plane Set", type:"Joinery Practice", difficulty:"Intermediate", notes:"Matched tongue and groove planes for edge jointing boards and panelled work.", tools:["Plough Plane","Rebate Plane","Hand Plane"], link:"", img:"", done:false, emoji:"🔧" },
  { id:5, title:"1/4 x 1/4 Rebate Plane", type:"Jig", difficulty:"Intermediate", notes:"Small rebate plane for cutting rabbets. Based on Paul Sellers' Poor Man's Rebate Plane.", tools:["Chisel","Hand Plane","Saw","Router Plane"], link:"https://paulsellers.com", img:"", done:false, emoji:"✂️" },
  { id:6, title:"Dovetail Boxes", type:"Box", difficulty:"Intermediate", notes:"Classic hand-cut through dovetails. Start with pine, move to hardwood.", tools:["Dovetail Saw","Chisel","Marking Gauge","Combination Square"], link:"", img:"", done:false, emoji:"📦" },
  { id:7, title:"Live Edge Coffee Table", type:"Furniture", difficulty:"Advanced", notes:"Feature slab top with live edge retained. Flatten slab, choose leg style.", tools:["Hand Plane","Router","Chisel","Saw","Clamps"], link:"", img:"", done:false, emoji:"🌳" },
  { id:8, title:"Coffee Table", type:"Furniture", difficulty:"Intermediate", notes:"Traditional mortise and tenon coffee table. Great M&T practice at scale.", tools:["Chisel","Hand Plane","Saw","Marking Gauge","Clamps"], link:"", img:"", done:false, emoji:"🪵" },
  { id:9, title:"Wooden Mallet", type:"Joinery Practice", difficulty:"Beginner", notes:"Paul Sellers classic beginner build. 3x6 head, oak or ash. Great mortise practice.", tools:["Chisel","Hand Plane","Saw","Marking Gauge"], link:"https://paulsellers.com", img:"", done:false, emoji:"🔨" }
];

let projects=[], activeFilter='All', currentId=null;

function load() {
  try { const s=localStorage.getItem(STORAGE_KEY); projects=s?JSON.parse(s):DEFAULTS; }
  catch { projects=DEFAULTS; }
  if (!projects.length) projects=DEFAULTS;
}

function save() { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(projects)); } catch {} }

function renderFilters() {
  document.getElementById('filters').innerHTML=CATS.map(c=>{
    const isGift=c==='Gift', active=activeFilter===c?'active':'';
    return `<button class="chip ${isGift?'gift-chip':''} ${active}" onclick="setFilter('${c}')">${isGift?'🎁 ':''}${c}</button>`;
  }).join('');
}

function setFilter(f) { activeFilter=f; renderFilters(); renderGrid(); }

function renderGrid() {
  const q=document.getElementById('searchInput').value.toLowerCase();
  const el=document.getElementById('grid');
  const filtered=projects.filter(p=>{
    const matchCat=activeFilter==='All'||p.type===activeFilter;
    const matchQ=!q||p.title.toLowerCase().includes(q)||(p.notes||'').toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  if (!filtered.length) { el.innerHTML=`<div class="empty"><div class="big">🪚</div><p>No projects found.<br>Tap + to add one.</p></div>`; return; }
  el.innerHTML=filtered.map(p=>{
    const gift=p.type==='Gift';
    const imgHtml=p.img?`<img src="${p.img}" alt="${p.title}" loading="lazy">`:`<div class="card-placeholder ${gift?'gift-bg':''}"><span class="emoji">${p.emoji||'🪵'}</span><span class="plabel">${p.type}</span></div>`;
    const badgeCls=p.done?'done':gift?'gift':'';
    const badgeTxt=p.done?'✓ Done':gift?'🎁 Gift':p.difficulty;
    return `<div class="card" onclick="openDetail(${p.id})"><div class="card-img">${imgHtml}<span class="card-badge ${badgeCls}">${badgeTxt}</span></div><div class="card-body"><div class="card-title">${p.title}</div><div class="card-type ${gift?'gift-type':''}">${p.type}</div></div></div>`;
  }).join('');
}

function openDetail(id) {
  const p=projects.find(x=>x.id===id); if (!p) return;
  currentId=id; const gift=p.type==='Gift';
  const hero=document.getElementById('modalHero');
  hero.className='modal-hero'+(gift?' gift-hero':'');
  hero.innerHTML=p.img?`<img src="${p.img}" alt="${p.title}">`:`<div class="big-emoji">${p.emoji||'🪵'}</div><div class="hero-label ${gift?'gift-label':''}">${p.type}</div>`;
  const tools=p.tools?.length?`<div class="msec"><h3>Tools Needed</h3><div class="tools-wrap">${p.tools.map(t=>`<span class="tool-tag">${t}</span>`).join('')}</div></div>`:'';
  const link=p.link?`<div class="msec"><h3>Reference</h3><a class="link-btn" href="${p.link}" target="_blank">🔗 Open Plans / Guide</a></div>`:'';
  const donePill=p.done?`<span class="pill done-pill">✓ Built</span>`:`<span class="pill">🔨 To Build</span>`;
  const giftPill=gift?`<span class="pill gift-pill">🎁 Gift</span>`:'';
  document.getElementById('modalContent').innerHTML=`
    <span class="modal-tag ${gift?'gift-tag':''}">${p.type}</span>
    <h2 class="modal-title">${p.title}</h2>
    <div class="meta-row"><span class="pill">📊 ${p.difficulty}</span>${donePill}${giftPill}</div>
    ${p.notes?`<div class="msec"><h3>Notes</h3><p>${p.notes}</p></div>`:''}
    ${tools}${link}
    <div class="modal-actions">
      <button class="btn btn-muted" onclick="deleteProject(${id})">🗑 Delete</button>
      <button class="btn ${p.done?'btn-muted':'btn-green'}" onclick="toggleDone(${id})">${p.done?'↩ Unmark':'✓ Mark Built'}</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetailClick(e) { if (e.target===document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); document.body.style.overflow=''; }

function toggleDone(id) {
  const p=projects.find(x=>x.id===id);
  if (p) { p.done=!p.done; save(); renderGrid(); openDetail(id); }
}

function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  projects=projects.filter(x=>x.id!==id);
  save(); closeDetail(); renderGrid();
}

function openAdd() { document.getElementById('addOverlay').classList.add('open'); document.body.style.overflow='hidden'; }

function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
  document.body.style.overflow='';
  ['newTitle','newNotes','newTools','newLink','newImg'].forEach(id=>document.getElementById(id).value='');
}

function saveProject() {
  const title=document.getElementById('newTitle').value.trim();
  if (!title) { alert('Please enter a project name.'); return; }
  const type=document.getElementById('newType').value;
  const emojis={Jig:'🔧',Accessory:'📐',Box:'📦',Furniture:'🪵','Joinery Practice':'✂️',Gift:'🎁',Other:'🪚'};
  const tools=document.getElementById('newTools').value.split(',').map(t=>t.trim()).filter(Boolean);
  projects.unshift({ id:Date.now(), title, type, difficulty:document.getElementById('newDiff').value, notes:document.getElementById('newNotes').value.trim(), tools, link:document.getElementById('newLink').value.trim(), img:document.getElementById('newImg').value.trim(), done:false, emoji:emojis[type]||'🪵' });
  save(); closeAdd(); renderGrid();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

load(); renderFilters(); renderGrid();
</script>
</body>
</html>
